    :root {

      --sea: #1f7a8c;

    }
    
    /* Prevent browsers from forcing dark mode inversion */
    html {

    body {

    /* Force light mode even if system prefers dark */
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: only light !important;
      }
      html, body {
        background-color: #ffffff !important;
      }
    }
    
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }
    
    .loader {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-bottom-color: var(--sea);
      border-radius: 50%;
      animation: rotation 0.6s linear infinite;
    }
    
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loaded #loading-screen {
      opacity: 0;
      pointer-events: none;
    }

    .animate-reveal {
      animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      will-change: transform, opacity;
    }
    
    @keyframes revealUp {
      0% { opacity: 0; transform: translateY(24px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }

    @keyframes slowZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }
    .animate-slow-zoom { 
      animation: slowZoom 15s infinite alternate ease-in-out;
      will-change: transform;
    }
    
    .view-transition {
      animation: simpleFade 0.25s ease-out;
      will-change: opacity;
    }
    @keyframes simpleFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .glass-header {
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      transition: background-color 0.3s ease, padding 0.3s ease, box-shadow 0.3s ease;
    }

    .stroke-text {
      -webkit-text-stroke: 1px var(--sand);
      color: transparent;
    }

    .stroke-text-dark {
      -webkit-text-stroke: 1px var(--deep);
      color: transparent;
    }

    .writing-mode-vertical {
      writing-mode: vertical-rl;
    }

      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

  <script>
    // Force light mode on load and prevent dark class injection by aggressive mobile browsers
    (function() {
      document.documentElement.classList.remove('dark');
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
            if (document.documentElement.classList.contains('dark')) {
              document.documentElement.classList.remove('dark');
            }
          }
        });
      });
      observer.observe(document.documentElement, { attributes: true });
    })();
  </script>
